name = "sweet-river-df8e"
main = "worker.js"
compatibility_date = "2024-01-01"

# 非机密环境变量（会随部署持久化）
# SECRET_KEY 请在 Dashboard 中设为「密钥」类型，不要写在这里
[vars]
FASTAPI_URL = "https://wicmail-mail.opxqo.cn/api/inbound/cloudflare"
# FALLBACK_EMAIL = "18727430326@163.com"
# MAX_RAW_SIZE_MB = "10"
# REQUEST_TIMEOUT_MS = "20000"
# FORWARD_TOO_LARGE = "true"
# REJECT_ON_FAILURE = "false"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "wicmail-attachments"

